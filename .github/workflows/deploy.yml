name: Quality

on:
  push:
    branches:
      - main

jobs:

  quality:

    runs-on: self-hosted

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      ####################
      # API
      ####################

      - name: Instalar API
        working-directory: api
        run: npm ci

      - name: Test API
        working-directory: api
        run: |
          npm test > ../api-test.txt
        continue-on-error: true

      ####################
      # Worker
      ####################

      - name: Instalar Worker
        working-directory: worker
        run: npm ci

      - name: Test Worker
        working-directory: worker
        run: |
          npm test > ../worker-test.txt
        continue-on-error: true

      ####################
      # Trivy
      ####################

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table
          output: trivy.txt
        continue-on-error: true

      ####################
      # Dashboard
      ####################

